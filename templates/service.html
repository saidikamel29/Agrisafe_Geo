<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrisafe Geo - Services</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cssservise.css') }}">

    <!-- OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>

    <style>
        /* Tooltip for area */
        .tooltip-measure {
            opacity: 1;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">Agrisafe Geo 🌱</div>
    <nav>
         <a href="{{ url_for('aboutus') }}" class="nav-btn">About Us</a>
            <a href="{{ url_for('service') }}" class="nav-btn active">Service</a>
            <a href="{{ url_for('service') }}" class="nav-btn">Media</a>
            <a href="{{ url_for('conect') }}" class="nav-btn ">Connect With Us</a>
    </nav>
</header>

<!-- SERVICES -->
<section class="services container text-center py-5">
    <h1 class="mb-5 display-4 fw-bold">Our Services</h1>
    <div class="row justify-content-center gap-4">
        <div class="col-md-4 box shadow-sm p-4" id="registerBox">
            <h4 class="mb-0">📄 Insurance Registration</h4>
        </div>
        <div class="col-md-4 box shadow-sm p-4" id="reportBox">
            <h4 class="mb-0">🚨 Damage Report</h4>
        </div>
    </div>
</section>

<!-- 🔵 REGISTER MODAL -->
<div id="registerModal" class="modal">
    <div class="modal-content shadow">
        <span class="close-custom text-danger" onclick="closeRegister()">&times;</span>
        <h2 class="mb-4 text-center">Insurance Registration</h2>

        <!-- STEPS -->
        <div class="steps d-flex justify-content-between mb-4">
            <div class="step-box rounded" onclick="showSection('farmer')">👤 Farmer</div>
            <div class="step-box rounded mx-2" onclick="showSection('warranty')">🌾 Field</div>
            <div class="step-box rounded" onclick="extraAction()">⚙️ drawing field boundaries</div>
        </div>

        <!-- FARMER -->
        <div id="farmer" class="form-section">
            <h4 class="mb-3">Farmer Information</h4>
            <input type="text" class="form-control mb-2" placeholder="Full Name">
            <input type="text" class="form-control mb-2" placeholder="National ID">
            <input type="date" class="form-control mb-2" placeholder="Date of Birth">
            <input type="text" class="form-control mb-2" placeholder="Place of Birth">
            <input type="text" class="form-control mb-3" placeholder="ID Culture">
            <button class="btn btn-success w-100">Send</button>
        </div>

        <!-- FIELD -->
        <div id="warranty" class="form-section" style="display: none;">
            <h4 class="mb-3">Warranty Information</h4>
            <div class="p-3 bg-light rounded border">
                <h5 class="mb-3">Choisissez votre activité</h5>
                <select id="type" class="form-select mb-2">
                    <option value="">-- Choisir type --</option>
                    <option value="plantation">Plantation</option>
                    <option value="culture_herbacees">Culture herbacées</option>
                    <option value="culture_permanentes">Culture permanentes</option>
                </select>
                <select id="category" class="form-select mb-2" disabled>
                    <option value="">-- Choisir catégorie --</option>
                </select>
                <select id="choix" class="form-select mb-3" disabled>
                    <option value="">-- Choisir --</option>
                </select>
                <div id="result" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- 🗺️ FULLSCREEN MAP -->
<div id="mapModal" class="map-modal">
    <!-- Professional Centered Search Bar -->
    <div class="position-absolute top-0 start-50 translate-middle-x mt-4 shadow-lg bg-white rounded-pill d-flex align-items-center" style="z-index: 1000; width: 450px; max-width: 90vw; padding: 6px;">
        <input type="text" id="mapSearchInput" class="form-control border-0 bg-transparent shadow-none ms-2" placeholder="🔍 ابحث عن مكان أو مدينة..." style="box-shadow: none; outline: none; font-size: 1.1rem;" onkeypress="if(event.key === 'Enter') searchLocation()">
        <button class="btn btn-success rounded-pill px-4 py-2 fw-bold" onclick="searchLocation()">بحث</button>
    </div>

    <!-- Close Button -->
    <button class="btn btn-danger close-map shadow-sm rounded-pill px-4 fw-bold" onclick="closeMap()">❌ إغلاق</button>
    
    <!-- Clear Drawing Button -->
    <button class="btn btn-warning shadow-lg position-absolute rounded-pill px-4 py-2 fw-bold" style="bottom: 20px; left: 20px; z-index: 1000; color: #000;" onclick="clearDrawing()">🗑️ إعادة الرسم</button>

    <!-- Info bar for showing area (Bottom) -->
    <div id="map-info" class="position-absolute bottom-0 start-50 translate-middle-x mb-4 px-4 py-2 bg-dark text-white rounded-pill shadow-lg d-flex align-items-center gap-2" style="z-index: 1000; display: none; font-size: 1.2rem; border: 2px solid #28a745;">
        <span>المساحة:</span>
        <span id="area-output" class="text-warning fw-bold fs-4">0</span>
    </div>

    <div id="map"></div>
    <button class="btn btn-success save-btn shadow-lg rounded-pill px-4 py-2 fw-bold" onclick="saveField()">✅ حفظ الحدود</button>
</div>

<!-- 🔴 REPORT MODAL -->
<div id="reportModal" class="modal">
    <div class="modal-content shadow">
        <span class="close-custom text-danger" onclick="closeReport()">&times;</span>
        <h2 class="mb-4 text-center">Report Issue</h2>
        <input type="file" class="form-control mb-2">
        <input type="date" class="form-control mb-2">
        <textarea class="form-control mb-3" rows="4" placeholder="Describe problem"></textarea>
        <button class="btn btn-danger w-100">Send Report</button>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script>
let map;
let draw;
let source;
let vector;
let currentPolygonCoords = [];
let currentPolygonArea = 0;

// OPEN MODALS
document.getElementById("registerBox").onclick = function () {
    document.getElementById("registerModal").style.display = "block";
    showSection('farmer');
}

document.getElementById("reportBox").onclick = function () {
    document.getElementById("reportModal").style.display = "block";
}

// CLOSE MODALS
function closeRegister() {
    document.getElementById("registerModal").style.display = "none";
}

function closeReport() {
    document.getElementById("reportModal").style.display = "none";
}

// SWITCH SECTIONS
function showSection(id) {
    document.querySelectorAll(".form-section").forEach(sec => {
        sec.style.display = "none";
    });
    let section = document.getElementById(id);
    if(section) section.style.display = "block";
}

// NEXT STEP → OPEN MAP WITH OPENLAYERS
function extraAction() {
    document.getElementById("registerModal").style.display = "none";
    document.getElementById("mapModal").style.display = "block";

    if (!map) {
        source = new ol.source.Vector({wrapX: false});
        vector = new ol.layer.Vector({
            source: source,
            style: new ol.style.Style({
                fill: new ol.style.Fill({
                    color: 'rgba(40, 167, 69, 0.4)'
                }),
                stroke: new ol.style.Stroke({
                    color: '#28a745',
                    width: 3
                }),
                image: new ol.style.Circle({
                    radius: 7,
                    fill: new ol.style.Fill({ color: '#28a745' })
                })
            })
        });

        // Initialize Map
        map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                }),
                vector
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([-0.6, 35.7]), // Set default center
                zoom: 10
            })
        });

        addInteraction();
    }

    setTimeout(() => {
        map.updateSize();
    }, 200);
}

// Add Drawing Interaction (Polygon)
function addInteraction() {
    draw = new ol.interaction.Draw({
        source: source,
        type: 'Polygon'
    });
    
    map.addInteraction(draw);

    draw.on('drawstart', function() {
        source.clear(); // Clear previous polygon to allow only one boundary
        document.getElementById("map-info").style.display = "none";
    });

    draw.on('drawend', function(e) {
        let feature = e.feature;
        let geometry = feature.getGeometry();
        
        // Calculate Area in square meters using ol.sphere
        let area = ol.sphere.getArea(geometry);
        currentPolygonArea = Math.round(area * 100) / 100;
        
        // Convert to EPSG:4326 to save standard Lat/Lon coordinates
        let clonedGeometry = geometry.clone().transform('EPSG:3857', 'EPSG:4326');
        currentPolygonCoords = clonedGeometry.getCoordinates();
        
        // Display area
        let displayArea = currentPolygonArea;
        let unit = 'm²';
        if (currentPolygonArea > 10000) {
            displayArea = (Math.round(currentPolygonArea / 10000 * 100) / 100);
            unit = 'hectares';
        }
        
        document.getElementById("area-output").innerText = displayArea + ' ' + unit;
        document.getElementById("map-info").style.display = "block";
        
        console.log("===============================");
        console.log("✅ إحداثيات حدود الأرض (Polygon):", currentPolygonCoords);
        console.log("✅ المساحة المحسوبة:", currentPolygonArea + " m²");
        console.log("===============================");
    });
}

// CLOSE MAP
function closeMap() {
    document.getElementById("mapModal").style.display = "none";
    document.getElementById("registerModal").style.display = "block"; // Return to register modal
}

// SAVE FIELD
function saveField() {
    if (currentPolygonCoords.length === 0) {
        alert("يرجى رسم حدود الأرض أولاً على الخريطة.");
        return;
    }
    alert("تم حفظ الحدود بنجاح! المساحة: " + document.getElementById("area-output").innerText);
    closeMap();
}

// OUTSIDE CLICK
window.onclick = function(event) {
    let reg = document.getElementById("registerModal");
    let rep = document.getElementById("reportModal");
    if (event.target == reg) reg.style.display = "none";
    if (event.target == rep) rep.style.display = "none";
}

// Search Location Function
async function searchLocation() {
    const query = document.getElementById('mapSearchInput').value;
    if (!query) return;

    try {
        // Search using Nominatim OpenStreetMap API
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const searchData = await response.json();
        
        if (searchData && searchData.length > 0) {
            const lon = parseFloat(searchData[0].lon);
            const lat = parseFloat(searchData[0].lat);
            
            // Move map to the searched location
            map.getView().animate({
                center: ol.proj.fromLonLat([lon, lat]),
                zoom: 14,
                duration: 1000
            });
        } else {
            alert("لم يتم العثور على المكان. جرب اسماً آخر.");
        }
    } catch (error) {
        console.error("Error searching location:", error);
        alert("حدث خطأ أثناء البحث.");
    }
}

// Clear Drawing Function
function clearDrawing() {
    if (source) {
        source.clear(); // Remove all features from map
    }
    currentPolygonCoords = [];
    currentPolygonArea = 0;
    document.getElementById("map-info").style.display = "none";
}

    },

            avoine: { text: "avoine", info: "Superficie: 8ha - Résistant à la sécheresse" },

        },

        },
        cultures_industrielles:{
            tomates: { text: "tomates", info: "Superficie: 5ha - Besoin modéré en eau" },
            tabac: { text: "tabac", info: "Superficie: 4ha - Climat sec" },

         },
    },
    culture_permanentes: {
        vigne: {
            raisin_table: { text: "Raisin de table", info: "Superficie: 3ha - Climat méditerranéen" },
            raisin_vin: { text: "Raisin pour vin", info: "Superficie: 4ha - Culture durable" },
        },
        prairies: {
            prairies_naturelles: { text: "prairies_naturelles", info: "Superficie: 5ha - Climat saharien" },
        },
    },
};

const type = document.getElementById("type");
const category = document.getElementById("category");
const choix = document.getElementById("choix");
const result = document.getElementById("result");

type.addEventListener("change", () => {
    category.innerHTML = "<option>-- Choisir catégorie --</option>";
    choix.innerHTML = "<option>-- Choisir --</option>";
    choix.disabled = true;

    if (type.value) {
        category.disabled = false;
        for (let cat in data[type.value]) {
            category.innerHTML += `<option value="${cat}">${cat}</option>`;
        }
    }
});

category.addEventListener("change", () => {
    choix.innerHTML = "<option>-- Choisir --</option>";
    if (category.value) {
        choix.disabled = false;
        let items = data[type.value][category.value];
        for (let item in items) {
            choix.innerHTML += `<option value="${item}">${items[item].text}</option>`;
        }
    }
});

choix.addEventListener("change", () => {
    if (choix.value) {
        let info = data[type.value][category.value][choix.value].info;
        result.innerHTML = `
            <div class="alert alert-success mt-2">
                <h5 class="alert-heading">اختيارك:</h5>
                <p class="mb-1 fw-bold">${choix.options[choix.selectedIndex].text}</p>
                <p class="mb-0 text-muted small">${info}</p>
            </div>
        `;
    }
});
</script>

</body>
</html>
