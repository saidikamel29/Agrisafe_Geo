<!-- 🔵 REGISTER MODAL -->
<div id="registerModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeRegister()">&times;</span>

        <h2>Insurance Registration</h2>

        <!-- STEPS -->
        <div class="steps">
            <div class="step-box" onclick="showSection('farmer')">👤 Farmer</div>
            <div class="step-box" onclick="showSection('warranty')">🌾 Field</div>
            <div class="step-box" onclick="extraAction()">⚙️ drawing field boundaries</div>
        </div>

        <!-- FARMER -->
        <div id="farmer" class="form-section">
            <h3>Farmer Information</h3>
            <input type="text" placeholder="Full Name">
            <input type="text" placeholder="National ID">
            <input type="date" placeholder="date of birth">
            <input type="text" placeholder="place of birth">
            <input type="text" placeholder="id culture">
            <button>Send</button>
        </div>

        <!-- FIELD -->
        <div id="warranty" class="form-section">
            <h3>warranty Information</h3>
            <div class="box">
    <h3>Choisissez votre activité</h3>

    <!-- Type -->
    <select id="type">
        <option value="">-- Choisir type --</option>
        <option value="plantation">Plantation</option>
        <option value="culture_herbacées">culture herbacées</option>
        <option value="culture_permanentes">culture permanentes</option>
    </select>

    <!-- Category -->
    <select id="category" disabled>
        <option value="">-- Choisir catégorie --</option>
    </select>

    <!-- Choix final -->
    <select id="choix" disabled>
        <option value="">-- Choisir --</option>
    </select>
    <!-- Result -->
    <div id="result"></div>
</div>

<!-- 🗺️ FULLSCREEN MAP -->
<div id="mapModal" class="map-modal">

    <button class="close-map" onclick="closeMap()">X</button>

    <div id="map"></div>

    <button class="save-btn" onclick="saveField()">OK</button>

</div>

<!-- 🔴 REPORT MODAL -->
<div id="reportModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeReport()">&times;</span>

        <h2>Report Issue</h2>

        <input type="file">
        <input type="date">
        <textarea placeholder="Describe problem"></textarea>

        <button>Send</button>

    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script>

let map;
let drawnItems;

// OPEN MODALS
document.getElementById("registerBox").onclick = function () {
    document.getElementById("registerModal").style.display = "block";
}

document.getElementById("reportBox").onclick = function () {
    document.getElementById("reportModal").style.display = "block";
}

// CLOSE MODALS
function closeRegister() {
    document.getElementById("registerModal").style.display = "none";
}

function closeReport() {
    document.getElementById("reportModal").style.display = "none";
}

// SWITCH SECTIONS
function showSection(id) {

    document.querySelectorAll(".form-section").forEach(sec => {
        sec.style.display = "none";
    });

    document.getElementById(id).style.display = "block";
}

// NEXT STEP → OPEN MAP
function extraAction() {

    document.getElementById("registerModal").style.display = "none";
    document.getElementById("mapModal").style.display = "block";

    if (!map) {

        map = L.map('map').setView([35.7, -0.6], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Map'
        }).addTo(map);

        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        let drawControl = new L.Control.Draw({
            draw: {
                polygon: true,
                rectangle: true
            },
            edit: {
                featureGroup: drawnItems
            }
        });

        map.addControl(drawControl);

        map.on('draw:created', function (e) {
            let layer = e.layer;
            drawnItems.addLayer(layer);

            console.log("Field coords:", layer.getLatLngs());
        });
    }

    setTimeout(() => {
        map.invalidateSize();
    }, 200);
}

// CLOSE MAP
function closeMap() {
    document.getElementById("mapModal").style.display = "none";
}

// SAVE FIELD
function saveField() {
    alert("Field saved successfully!");
    closeMap();
}

const type = document.getElementById("type");
const category = document.getElementById("category");
const choix = document.getElementById("choix");
const result = document.getElementById("result");

type.addEventListener("change", () => {
    category.innerHTML = "<option>-- Choisir catégorie --</option>";
    choix.innerHTML = "<option>-- Choisir --</option>";
    choix.disabled = true;

    if (type.value) {
        category.disabled = false;

        for (let cat in data[type.value]) {
            category.innerHTML += `<option value="${cat}">${cat}</option>`;
        }
    }
});

category.addEventListener("change", () => {
    choix.innerHTML = "<option>-- Choisir --</option>";

    if (category.value) {
        choix.disabled = false;

        let items = data[type.value][category.value];
        for (let item in items) {
            choix.innerHTML += `<option value="${item}">${items[item].text}</option>`;
        }
    }
});

choix.addEventListener("change", () => {
    if (choix.value) {
        let info = data[type.value][category.value][choix.value].info;

        result.innerHTML = `
            <h4>اختيارك:</h4>
            <p>${choix.options[choix.selectedIndex].text}</p>
            <p>${info}</p>
        `;
