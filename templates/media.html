<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrisafe Geo - Media</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS الخاص بصفحة الميديا -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/media.css') }}">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">Agrisafe Geo 🌱</div>
    <nav>
        <a href="{{ url_for('aboutus') }}" class="nav-btn ">About Us</a>
       <a href="{{ url_for('service') }}" class="nav-btn ">Service</a>
       <a href="{{ url_for('media') }}" class="nav-btn active">Media</a>
       <a href="{{ url_for('conect') }}" class="nav-btn">Connect With Us</a>
    </nav>
</header>

<!-- MEDIA GALLERY -->
<section class="container py-5 mt-4">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-success" style="color: #0b3d2e !important;">معرض الصور والفيديو</h1>
        <p class="text-secondary fs-5">استكشف مشاريعنا وحقولنا الزراعية من خلال هذا المعرض</p>
    </div>

    <!-- Gallery Tabs -->
    <ul class="nav nav-pills justify-content-center mb-5" id="media-tabs">
        <li class="nav-item">
            <a class="nav-link active shadow-sm" href="#" data-filter="all">الكل</a>
        </li>
        <li class="nav-item mx-2">
            <a class="nav-link shadow-sm" href="#" data-filter="images">صور</a>
        </li>
        <li class="nav-item">
            <a class="nav-link shadow-sm" href="#" data-filter="videos">فيديوهات</a>
        </li>
    </ul>

    <!-- Gallery Grid -->
    <div class="row g-4" id="gallery">
        <!-- Image Item 1 -->
        <div class="col-md-4 col-sm-6 media-item images">
            <div class="card border-0 shadow-sm overflow-hidden gallery-card">
                <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top gallery-img" alt="Farm Image">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold text-dark">حقل القمح الذهبي</h5>
                </div>
            </div>
        </div>
        
        <!-- Image Item 2 -->
        <div class="col-md-4 col-sm-6 media-item images">
            <div class="card border-0 shadow-sm overflow-hidden gallery-card">
                <img src="https://images.unsplash.com/photo-1625246333195-78d9c38ad449?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top gallery-img" alt="Tractor">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold text-dark">الآلات الزراعية الحديثة</h5>
                </div>
            </div>
        </div>
        
        <!-- Image Item 3 -->
        <div class="col-md-4 col-sm-6 media-item images">
            <div class="card border-0 shadow-sm overflow-hidden gallery-card">
                <img src="https://images.unsplash.com/photo-1592982537447-6f2334816eec?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top gallery-img" alt="Green Field">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold text-dark">المحاصيل الخضراء</h5>
                </div>
            </div>
        </div>
        
        <!-- Video Item 1 -->
        <div class="col-md-4 col-sm-6 media-item videos">
            <div class="card border-0 shadow-sm overflow-hidden gallery-card video-card">
                <div class="position-relative">
                    <img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top gallery-img" alt="Video">
                    <div class="play-btn-overlay">▶</div>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold text-dark">فيديو تعريفي للمزارع</h5>
                </div>
            </div>
        </div>

        <!-- Video Item 2 -->
        <div class="col-md-4 col-sm-6 media-item videos">
            <div class="card border-0 shadow-sm overflow-hidden gallery-card video-card">
                <div class="position-relative">
                    <img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top gallery-img" alt="Video">
                    <div class="play-btn-overlay">▶</div>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold text-dark">طرق الري الحديثة</h5>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- سكربت فلترة الصور والفيديو -->
<script>
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            
            // إزالة اللون من جميع الأزرار
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            // تفعيل الزر المضغوط
            this.classList.add('active');
            
            const filter = this.getAttribute('data-filter');
            const items = document.querySelectorAll('.media-item');
            
            // إخفاء وإظهار العناصر بناءً على الاختيار
            items.forEach(item => {
                if(filter === 'all' || item.classList.contains(filter)) {
                    item.style.display = 'block';
                    setTimeout(() => { item.style.opacity = '1'; item.style.transform = 'scale(1)'; }, 50);
                } else {
                    item.style.opacity = '0'; 
                    item.style.transform = 'scale(0.8)';
                    setTimeout(() => { item.style.display = 'none'; }, 300);
                }
            });
        });
    });
</script>

</body>
</html>
